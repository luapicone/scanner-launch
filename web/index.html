<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scanner Launch Dashboard</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --panel: #121a30;
        --panel-2: #1a2544;
        --text: #e8ecf8;
        --muted: #99a4c0;
        --accent: #65d1ff;
        --ok: #1fc77e;
        --warn: #f5b83d;
        --bad: #ff6b6b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background: linear-gradient(180deg, #0b1020 0%, #111831 100%);
        color: var(--text);
      }
      .wrap { max-width: 1400px; margin: 0 auto; padding: 24px; }
      h1 { margin: 0 0 6px; }
      .sub { color: var(--muted); margin-bottom: 20px; }
      .controls, .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
      }
      .card {
        background: rgba(18, 26, 48, 0.92);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.22);
      }
      label { display:block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
      input, select, button {
        width: 100%; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
        background: var(--panel-2); color: var(--text); padding: 10px 12px; font: inherit;
      }
      button { background: linear-gradient(135deg, #1677ff, #40c4ff); border: none; font-weight: 700; cursor: pointer; }
      button.secondary { background: #243252; }
      .actions { display:flex; gap: 10px; align-items:end; }
      .actions button { flex:1; }
      .stats { margin: 18px 0; }
      .stat-value { font-size: 26px; font-weight: 800; }
      .stat-label { color: var(--muted); font-size: 13px; }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.07); text-align: left; vertical-align: top; }
      th { color: var(--muted); font-size: 12px; position: sticky; top: 0; background: var(--panel); }
      .table-wrap { overflow:auto; max-height: 70vh; }
      .pill { display:inline-block; padding: 4px 8px; border-radius: 999px; font-size: 12px; font-weight: 700; }
      .pill.CONFIABLE, .pill.MUY\ CONFIABLE { background: rgba(31,199,126,.15); color: #7ef0b6; }
      .pill.RIESGO\ MEDIO { background: rgba(245,184,61,.14); color: #ffd36a; }
      .pill.ALTO\ RIESGO, .pill.SCAM { background: rgba(255,107,107,.14); color: #ff9b9b; }
      .small { color: var(--muted); font-size: 12px; }
      .link { color: var(--accent); text-decoration: none; }
      .flags { display:flex; flex-wrap:wrap; gap: 6px; }
      .flag { background: rgba(255,255,255,0.08); border-radius: 999px; padding: 4px 8px; font-size: 12px; }
      .flag.good { color: #86efac; }
      .flag.bad { color: #fca5a5; }
      .status { margin: 14px 0; color: var(--muted); }
      .hidden { display:none; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Crypto Launch Scanner</h1>
      <div class="sub">Dashboard local para ver launches, compra, riesgo y proyección heurística.</div>

      <div class="controls card">
        <div>
          <label>Modo</label>
          <select id="mode">
            <option value="scan">Scan completo</option>
            <option value="discover">Solo discovery</option>
          </select>
        </div>
        <div>
          <label>Límite</label>
          <input id="limit" type="number" min="1" max="200" value="20" />
        </div>
        <div>
          <label>Máx horas</label>
          <input id="maxAgeHours" type="number" min="1" max="168" value="24" />
        </div>
        <div>
          <label>Buscar token puntual</label>
          <input id="token" type="text" placeholder="BONK / WIF / nombre" />
        </div>
        <div>
          <label>Chain opcional</label>
          <input id="chain" type="text" placeholder="solana / ethereum" />
        </div>
        <div class="actions">
          <button id="runBtn">Ejecutar</button>
          <button id="analyzeBtn" class="secondary">Analizar token</button>
        </div>
      </div>

      <div class="status" id="status">Listo.</div>

      <div class="stats" id="stats"></div>

      <div class="card table-wrap">
        <table>
          <thead>
            <tr>
              <th>Token</th>
              <th>Riesgo</th>
              <th>Score</th>
              <th>Lanzamiento</th>
              <th>Compra</th>
              <th>Proyección</th>
              <th>Flags</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>

    <script>
      const rowsEl = document.getElementById('rows');
      const statsEl = document.getElementById('stats');
      const statusEl = document.getElementById('status');

      document.getElementById('runBtn').addEventListener('click', runMode);
      document.getElementById('analyzeBtn').addEventListener('click', analyzeToken);

      async function runMode() {
        const mode = document.getElementById('mode').value;
        const limit = document.getElementById('limit').value;
        const maxAgeHours = document.getElementById('maxAgeHours').value;
        setStatus('Cargando...');
        try {
          const res = await fetch(`/api/${mode}?limit=${encodeURIComponent(limit)}&maxAgeHours=${encodeURIComponent(maxAgeHours)}`);
          const data = await res.json();
          render(mode, data);
          setStatus(`OK, fuente ${data.source || '—'}, fetchedAt ${data.fetchedAt || '—'}`);
        } catch (err) {
          setStatus(`Error: ${err.message}`);
        }
      }

      async function analyzeToken() {
        const token = document.getElementById('token').value.trim();
        const chain = document.getElementById('chain').value.trim();
        if (!token) {
          setStatus('Poné un token para analizar.');
          return;
        }
        setStatus('Analizando token...');
        try {
          const res = await fetch(`/api/analyze?token=${encodeURIComponent(token)}&chain=${encodeURIComponent(chain)}`);
          const data = await res.json();
          render('analyze', data);
          setStatus(`Análisis listo para ${data.symbol || token}.`);
        } catch (err) {
          setStatus(`Error: ${err.message}`);
        }
      }

      function render(mode, data) {
        const tokens = mode === 'analyze' ? [data] : (data.tokens || []);
        renderStats(tokens);
        rowsEl.innerHTML = tokens.map(renderRow).join('');
      }

      function renderStats(tokens) {
        const totals = {
          total: tokens.length,
          confiables: tokens.filter(t => ['CONFIABLE', 'MUY CONFIABLE'].includes(t.riskLevel)).length,
          medios: tokens.filter(t => t.riskLevel === 'RIESGO MEDIO').length,
          riesgosos: tokens.filter(t => ['ALTO RIESGO', 'SCAM'].includes(t.riskLevel)).length,
        };
        statsEl.innerHTML = [
          statCard('Tokens', totals.total),
          statCard('Confiables', totals.confiables),
          statCard('Riesgo medio', totals.medios),
          statCard('Altos/scam', totals.riesgosos),
        ].join('');
      }

      function statCard(label, value) {
        return `<div class="card"><div class="stat-value">${value}</div><div class="stat-label">${label}</div></div>`;
      }

      function renderRow(token) {
        const risk = token.riskLevel || '—';
        const score = token.overallScore ?? '—';
        const launchTime = token.launchTime || '—';
        const launchAgo = token.launchAgo || '—';
        const buyPlatform = (token.buyPlatform || []).join(', ') || '—';
        const buyLink = token.buyLink || '—';
        const projection = token.projection || token.analysis || '—';
        const green = (token.greenFlags || []).map(f => `<span class="flag good">${escapeHtml(f)}</span>`).join('');
        const red = (token.redFlags || []).map(f => `<span class="flag bad">${escapeHtml(f)}</span>`).join('');
        return `
          <tr>
            <td>
              <strong>${escapeHtml(token.name || token.symbol || '—')}</strong><br>
              <span class="small">${escapeHtml(token.symbol || '—')} • ${escapeHtml(token.chain || '—')}</span>
            </td>
            <td><span class="pill ${risk}">${escapeHtml(risk)}</span></td>
            <td><strong>${score}</strong></td>
            <td>${escapeHtml(launchTime)}<br><span class="small">${escapeHtml(launchAgo)}</span></td>
            <td>${escapeHtml(buyPlatform)}<br>${buyLink !== '—' ? `<a class="link" href="${buyLink}" target="_blank">Abrir par</a>` : '<span class="small">—</span>'}</td>
            <td>${escapeHtml(projection)}</td>
            <td><div class="flags">${green}${red || '<span class="small">—</span>'}</div></td>
          </tr>
        `;
      }

      function setStatus(text) { statusEl.textContent = text; }
      function escapeHtml(text) {
        return String(text)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      runMode();
    </script>
  </body>
</html>
